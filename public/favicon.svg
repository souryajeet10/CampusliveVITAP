<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow filter -->
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="logo-node-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="chalice-grad" x1="50" y1="45" x2="50" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#22d3ee" />
      <stop offset="50%" stopColor="#6366f1" />
      <stop offset="100%" stopColor="#a855f7" />
    </linearGradient>

    <linearGradient id="hex-grad" x1="50" y1="22" x2="50" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#818cf8" />
      <stop offset="100%" stopColor="#c084fc" />
    </linearGradient>

    <linearGradient id="line-grad" x1="50" y1="5" x2="50" y2="23.7" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#22d3ee" />
      <stop offset="100%" stopColor="#6366f1" />
    </linearGradient>
  </defs>

  <!-- Vertical Lines -->
  <line x1="47" y1="5" x2="47" y2="23.7" stroke="url(#line-grad)" strokeWidth="2.2" strokeLinecap="round" filter="url(#logo-glow)" />
  <line x1="53" y1="5" x2="53" y2="23.7" stroke="url(#line-grad)" strokeWidth="2.2" strokeLinecap="round" filter="url(#logo-glow)" />

  <!-- Hexagon Structure -->
  <polygon points="50,22 65.588,31 65.588,49 50,58 34.412,49 34.412,31" stroke="url(#hex-grad)" strokeWidth="1.8" strokeLinejoin="round" filter="url(#logo-glow)" />

  <!-- Inner Radial Lines -->
  <line x1="50" y1="40" x2="50" y2="22" stroke="url(#hex-grad)" strokeWidth="1.2" filter="url(#logo-glow)" />
  <line x1="50" y1="40" x2="65.588" y2="31" stroke="url(#hex-grad)" strokeWidth="1.2" filter="url(#logo-glow)" />
  <line x1="50" y1="40" x2="65.588" y2="49" stroke="url(#hex-grad)" strokeWidth="1.2" filter="url(#logo-glow)" />
  <line x1="50" y1="40" x2="50" y2="58" stroke="url(#hex-grad)" strokeWidth="1.2" filter="url(#logo-glow)" />
  <line x1="50" y1="40" x2="34.412" y2="49" stroke="url(#hex-grad)" strokeWidth="1.2" filter="url(#logo-glow)" />
  <line x1="50" y1="40" x2="34.412" y2="31" stroke="url(#hex-grad)" strokeWidth="1.2" filter="url(#logo-glow)" />

  <!-- Inner Circle -->
  <circle cx="50" cy="40" r="7.5" stroke="url(#hex-grad)" strokeWidth="1.2" filter="url(#logo-glow)" />

  <!-- Chalice / Wings Shape at bottom - Symmetrical Crossover Loops -->
  <path d="M 50 95 C 42 90 14 74 14 48 C 14 45 18 45 22 55 C 38 68 53 78 53 85 C 53 89 51 93 50 95 Z" stroke="url(#chalice-grad)" strokeWidth="2.5" strokeLinejoin="round" fill="url(#chalice-grad)" fillOpacity="0.04" filter="url(#logo-glow)" />
  <path d="M 50 95 C 58 90 86 74 86 48 C 86 45 82 45 78 55 C 62 68 47 78 47 85 C 47 89 49 93 50 95 Z" stroke="url(#chalice-grad)" strokeWidth="2.5" strokeLinejoin="round" fill="url(#chalice-grad)" fillOpacity="0.04" filter="url(#logo-glow)" />

  <!-- Glowing Nodes / Dots -->
  <circle cx="50" cy="40" r="2.2" fill="#22d3ee" filter="url(#logo-node-glow)" />
  <circle cx="50" cy="22" r="2.2" fill="#22d3ee" filter="url(#logo-node-glow)" />
  <circle cx="65.588" cy="31" r="2.2" fill="#22d3ee" filter="url(#logo-node-glow)" />
  <circle cx="65.588" cy="49" r="2.2" fill="#22d3ee" filter="url(#logo-node-glow)" />
  <circle cx="50" cy="58" r="2.2" fill="#22d3ee" filter="url(#logo-node-glow)" />
  <circle cx="34.412" cy="49" r="2.2" fill="#22d3ee" filter="url(#logo-node-glow)" />
  <circle cx="34.412" cy="31" r="2.2" fill="#22d3ee" filter="url(#logo-node-glow)" />
</svg>